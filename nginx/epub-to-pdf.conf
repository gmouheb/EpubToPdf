# Nginx reverse proxy for the EPUB-to-PDF Next.js app.
#
# Install example:
#   sudo cp nginx/epub-to-pdf.conf /etc/nginx/sites-available/epub-to-pdf
#   sudo ln -s /etc/nginx/sites-available/epub-to-pdf /etc/nginx/sites-enabled/epub-to-pdf
#   sudo nginx -t
#   sudo systemctl reload nginx
#
# Replace server_name with your domain before production use.

upstream epub_to_pdf_next {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;

    client_max_body_size 100m;

    access_log /var/log/nginx/epub-to-pdf.access.log;
    error_log /var/log/nginx/epub-to-pdf.error.log;

    location / {
        proxy_pass http://epub_to_pdf_next;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_request_buffering on;
    }
}
